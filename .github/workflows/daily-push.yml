name: Daily Push - 晨间轻读

on:
  schedule:
    # UTC 23:00 = 北京时间 07:00
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run daily push
        env:
          SCT_KEYS: ${{ secrets.SCT_KEYS }}
        run: python daily_push.py
